name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: serial-mcp-server.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: serial-mcp-server-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: serial-mcp-server-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: serial-mcp-server-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/serial-mcp-server.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/serial-mcp-server ${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List binaries
        run: ls -la binaries/

      - name: Upload to Release
        run: |
          gh release upload "${{ github.ref_name }}" binaries/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
