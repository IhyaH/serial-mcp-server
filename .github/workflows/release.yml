name: Release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: serial-mcp-server.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: serial-mcp-server
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: serial-mcp-server-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: serial-mcp-server-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach binaries to release
        run: |
          cd artifacts
          for dir in */; do
            binary=$(ls "$dir")
            cp "$dir/$binary" "./$binary"
          done
          ls -la
          gh release upload "${{ github.ref_name }}" ./*.exe ./*serial-mcp-server* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
